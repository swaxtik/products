<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Abharan Jewellers Udupi Since - 1935</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#8B1538">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Jewelry Gallery">
    <link rel="icon" type="image/webp" href="a logo copy.webp">
    <link rel="shortcut icon" type="image/webp" href="a logo copy.webp">
    <link rel="apple-touch-icon" href="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTkyIiBoZWlnaHQ9IjE5MiIgdmlld0JveD0iMCAwIDI0IDI0IiBmaWxsPSJub25lIiBzdHJva2U9IndoaXRlIiBzdHJva2Utd2lkdGg9IjEuNSIgc3R5bGU9ImJhY2tncm91bmQ6ICM4QjE1Mzg7Ij48cGF0aCBkPSJNNiAzaDEybDQgNi0xMCAxMS0xMC0xMSA0LTZ6Ii8+PHBhdGggZD0iTTExIDNoMnoiLz48L3N2Zz4=">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo">
                    <img src="a logo copy.webp" alt="Abharan Logo" style="height: 150px;">
                </div>
                <h1>Abharan Jewellers Udupi Since - 1935</h1>
                <p>Find Your Finest Collections</p>
            </div>
            
            <div class="login-options">
                <div class="role-selector">
                    <button id="adminBtn" class="role-btn active" data-role="admin">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                        </svg>
                        Store Owner
                    </button>
                    <button id="userBtn" class="role-btn" data-role="user">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        Customer
                    </button>
                </div>
                
                <div id="adminLogin" class="login-form">
                    <input type="password" id="adminPassword" placeholder="Enter store owner password" class="password-input">
                    <button id="adminLoginBtn" class="login-btn">Access Store Management</button>
                </div>
                
                <div id="userLogin" class="login-form hidden">
                    <button id="userLoginBtn" class="login-btn">Browse Collections</button>
                </div>
            </div>
            
            <div class="login-footer">
                <p>Welcome To Abharan Udupi</p>
            </div>
        </div>
    </div>

    <script defer src="js/auth.js?v=20260227-1"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Fallback: keep login usable if external auth.js fails to load on hosting.
            setTimeout(() => {
                if (window.__authReady) return;

                const adminBtn = document.getElementById('adminBtn');
                const userBtn = document.getElementById('userBtn');
                const adminLoginBtn = document.getElementById('adminLoginBtn');
                const userLoginBtn = document.getElementById('userLoginBtn');
                const adminPassword = document.getElementById('adminPassword');
                const adminLogin = document.getElementById('adminLogin');
                const userLogin = document.getElementById('userLogin');
                const ADMIN_PASSWORD = 'Swasthik@Abj';

                const showError = (message) => {
                    const existingError = document.querySelector('.error-message');
                    if (existingError) existingError.remove();

                    const errorDiv = document.createElement('div');
                    errorDiv.className = 'error-message';
                    errorDiv.style.cssText = 'background:#FEE2E2;border:1px solid #FECACA;color:#DC2626;padding:12px;border-radius:12px;margin-top:16px;font-size:14px;text-align:center;';
                    errorDiv.textContent = message;
                    const loginForm = document.querySelector('.login-form:not(.hidden)');
                    loginForm.appendChild(errorDiv);
                    setTimeout(() => errorDiv.remove(), 3000);
                };

                const switchRole = (role) => {
                    if (role === 'admin') {
                        adminBtn.classList.add('active');
                        userBtn.classList.remove('active');
                        adminLogin.classList.remove('hidden');
                        userLogin.classList.add('hidden');
                    } else {
                        userBtn.classList.add('active');
                        adminBtn.classList.remove('active');
                        userLogin.classList.remove('hidden');
                        adminLogin.classList.add('hidden');
                    }
                };

                const setAuthStatus = (role) => {
                    localStorage.setItem('userRole', role);
                    localStorage.setItem('authTimestamp', Date.now().toString());
                    window.location.href = 'gallery.html';
                };

                adminBtn.addEventListener('click', () => switchRole('admin'));
                userBtn.addEventListener('click', () => switchRole('user'));
                adminLoginBtn.addEventListener('click', () => {
                    if (adminPassword.value === ADMIN_PASSWORD) {
                        setAuthStatus('admin');
                    } else {
                        showError('Invalid password');
                    }
                });
                userLoginBtn.addEventListener('click', () => setAuthStatus('user'));
                adminPassword.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') adminLoginBtn.click();
                });
            }, 1200);
        });
    </script>
</body>
</html>
